name: Publish to All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps 2>&1 || npm install 2>&1 || echo "Dependencies skipped"

      - name: Build
        run: npm run build 2>&1 || echo "Build skipped"

      - name: Publish to NPM
        if: env.NPM_TOKEN != ''
        run: npm publish --access public 2>&1 || echo "NPM publish skipped (no token)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to JSR.io
        if: env.JSR_TOKEN != ''
        run: npx jsr publish 2>&1 || echo "JSR publish skipped (no token)"
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Documentation
        run: |
          mkdir -p _site
          [ -f "README.md" ] && cp README.md _site/index.md || echo "# Documentation" > _site/index.md
          for doc in CONTRIBUTING.md SECURITY.md; do
            [ -f "$doc" ] && cp "$doc" "_site/" || true
          done

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
