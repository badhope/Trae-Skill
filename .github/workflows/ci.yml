# DevFlow Agent - GitHub Actions CI/CD
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npm run typecheck

    - name: Run tests
      run: npm test

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Check file structure
      run: |
        echo "=== DevFlow Agent Structure ==="
        test -f agent.yaml && echo "✓ agent.yaml exists"
        test -f system-prompt.md && echo "✓ system-prompt.md exists"
        test -f README.md && echo "✓ README.md exists"
        test -d workflow/ && echo "✓ workflow/ exists"
        test -d knowledge/ && echo "✓ knowledge/ exists"
        test -d tests/ && echo "✓ tests/ exists"

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Count project statistics
      run: |
        echo "=== DevFlow Agent Statistics ==="
        echo "Total files:"
        find . -type f -not -path './.git/*' -not -path './node_modules/*' | wc -l
        echo ""
        echo "Workflow definitions:"
        find . -name "stages.yaml" -not -path './.git/*' | wc -l
        echo ""
        echo "Intent definitions:"
        find . -name "intent.yaml" -not -path './.git/*' | wc -l
        echo ""
        echo "Tool definitions:"
        find . -name "tools.yaml" -not -path './.git/*' | wc -l
        echo ""
        echo "Test cases:"
        find . -name "test_cases.yaml" -not -path './.git/*' | wc -l

  quality-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check required files
      run: |
        echo "=== Required Documentation ==="
        test -f LICENSE && echo "✓ LICENSE"
        test -f CONTRIBUTING.md && echo "✓ CONTRIBUTING.md"
        test -f CODE_OF_CONDUCT.md && echo "✓ CODE_OF_CONDUCT.md"
        test -f .gitignore && echo "✓ .gitignore"
        test -f .github/workflows/ci.yml && echo "✓ CI workflow"

  security-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Audit dependencies
      run: npm audit --audit-level=high
